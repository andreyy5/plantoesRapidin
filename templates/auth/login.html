{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Rapidin Plantões</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Poppins','sans-serif']}}}}</script>
</head>
<body class="font-sans min-h-screen bg-[#111] flex items-center justify-center relative overflow-hidden">

  <!-- Background grid -->
  <div class="absolute inset-0 pointer-events-none"
       style="background-image: linear-gradient(rgba(233,73,32,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(233,73,32,0.04) 1px, transparent 1px); background-size: 48px 48px;"></div>

  <!-- Glow blobs -->
  <div class="absolute top-10 left-10 w-72 h-72 bg-[#E94920]/15 rounded-full blur-[100px] pointer-events-none"></div>
  <div class="absolute bottom-10 right-10 w-72 h-72 bg-[#E94920]/10 rounded-full blur-[100px] pointer-events-none"></div>

  <!-- Card -->
  <div class="relative z-10 w-full max-w-sm px-4">
    <div class="bg-[#1a1a1a] border border-[#E94920]/20 rounded-3xl p-8 shadow-2xl">

      <!-- Logo -->
      <div class="flex flex-col items-center mb-8">
        <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-[#E94920] to-[#ff6a45] flex items-center justify-center mb-4 shadow-lg shadow-[#E94920]/30 overflow-hidden">
          <img src="{% static 'assets/logoRapidin.png' %}" alt="Rapidin" class="w-full h-full object-contain">
        </div>
        <h1 class="text-2xl font-bold text-white">Rapidin Plantões</h1>
        <p class="text-sm text-gray-500 mt-1">Acesse sua conta</p>
      </div>

      <!-- Erros de autenticação -->
      {% if form.non_field_errors %}
      <div class="mb-4 px-4 py-3 rounded-xl bg-red-500/10 border border-red-500/30 text-sm text-red-400">
        {{ form.non_field_errors }}
      </div>
      {% endif %}

      <!-- Formulário -->
      <form method="post" class="flex flex-col gap-4">
        {% csrf_token %}

        <div class="flex flex-col gap-1.5">
          <label for="id_username" class="text-xs font-semibold text-[#E94920] uppercase tracking-wider">Usuário</label>
          <input type="text" name="username" id="id_username" placeholder="Digite seu usuário" required
                 class="w-full px-4 py-3 bg-black/50 border border-[#E94920]/20 rounded-xl text-white text-sm placeholder-gray-600 focus:outline-none focus:border-[#E94920]/60 transition-colors">
        </div>

        <div class="flex flex-col gap-1.5">
          <label for="id_password" class="text-xs font-semibold text-[#E94920] uppercase tracking-wider">Senha</label>
          <div class="relative">
            <input type="password" name="password" id="id_password" placeholder="Digite sua senha" required
                   class="w-full px-4 py-3 pr-11 bg-black/50 border border-[#E94920]/20 rounded-xl text-white text-sm placeholder-gray-600 focus:outline-none focus:border-[#E94920]/60 transition-colors">
            <button type="button" onclick="togglePassword()"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-[#E94920]/60 hover:text-[#E94920] transition-colors p-1">
              <svg id="eye-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg id="eye-slash-icon" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit"
                class="w-full py-3 rounded-xl bg-gradient-to-r from-[#E94920] to-[#ff6a45] text-white font-bold text-sm uppercase tracking-wider hover:shadow-lg hover:shadow-[#E94920]/30 hover:-translate-y-0.5 active:translate-y-0 transition-all">
          Entrar
        </button>

        <div class="text-center">
          <a href="{% url 'password_reset' %}" class="text-xs text-[#E94920]/60 hover:text-[#E94920] transition-colors">
            Esqueceu sua senha?
          </a>
        </div>
      </form>
    </div>

    <p class="text-center text-[11px] text-gray-700 mt-5">© 2026 Rapidin Plantões. Todos os direitos reservados.</p>
  </div>

  <script>
  function togglePassword() {
    const input = document.getElementById('id_password');
    const eye = document.getElementById('eye-icon');
    const eyeSlash = document.getElementById('eye-slash-icon');
    if (input.type === 'password') {
      input.type = 'text';
      eye.classList.add('hidden');
      eyeSlash.classList.remove('hidden');
    } else {
      input.type = 'password';
      eye.classList.remove('hidden');
      eyeSlash.classList.add('hidden');
    }
  }
  </script>
</body>
</html>
