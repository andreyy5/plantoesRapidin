{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Senha Alterada – Rapidin Plantões</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Poppins','sans-serif']}}}}</script>
</head>
<body class="font-sans min-h-screen bg-[#111] flex items-center justify-center relative overflow-hidden">
  <div class="absolute inset-0 pointer-events-none" style="background-image: linear-gradient(rgba(233,73,32,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(233,73,32,0.04) 1px, transparent 1px); background-size: 48px 48px;"></div>
  <div class="absolute top-10 left-10 w-72 h-72 bg-[#E94920]/15 rounded-full blur-[100px] pointer-events-none"></div>
  <div class="absolute bottom-10 right-10 w-72 h-72 bg-[#E94920]/10 rounded-full blur-[100px] pointer-events-none"></div>

  <div class="relative z-10 w-full max-w-sm px-4">
    <div class="bg-[#1a1a1a] border border-[#E94920]/20 rounded-3xl p-8 shadow-2xl text-center">
      <div class="w-20 h-20 mx-auto rounded-full bg-gradient-to-br from-emerald-500 to-emerald-600 flex items-center justify-center mb-5 shadow-lg shadow-emerald-500/30">
        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
      </div>
      <h1 class="text-xl font-bold text-white mb-2">Senha Alterada!</h1>
      <p class="text-sm text-gray-400 mb-5">Sua senha foi redefinida com sucesso. Agora você pode fazer login.</p>

      <div class="px-4 py-3 rounded-xl bg-emerald-500/10 border border-emerald-500/20 mb-5">
        <p class="text-xs text-emerald-400">
          Guarde sua senha em um local seguro e não a compartilhe com ninguém.
        </p>
      </div>

      <a href="{% url 'login' %}" class="block w-full py-3 rounded-xl bg-gradient-to-r from-[#E94920] to-[#ff6a45] text-white font-bold text-sm uppercase tracking-wider hover:shadow-lg hover:shadow-[#E94920]/30 hover:-translate-y-0.5 transition-all">
        Fazer Login
      </a>
    </div>
    <p class="text-center text-[11px] text-gray-700 mt-5">© 2026 Rapidin Plantões. Todos os direitos reservados.</p>
  </div>
</body>
</html>
