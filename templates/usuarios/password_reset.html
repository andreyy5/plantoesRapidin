{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Senha – Rapidin Plantões</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Poppins','sans-serif']}}}}</script>
</head>
<body class="font-sans min-h-screen bg-[#111] flex items-center justify-center relative overflow-hidden">
  <div class="absolute inset-0 pointer-events-none" style="background-image: linear-gradient(rgba(233,73,32,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(233,73,32,0.04) 1px, transparent 1px); background-size: 48px 48px;"></div>
  <div class="absolute top-10 left-10 w-72 h-72 bg-[#E94920]/15 rounded-full blur-[100px] pointer-events-none"></div>
  <div class="absolute bottom-10 right-10 w-72 h-72 bg-[#E94920]/10 rounded-full blur-[100px] pointer-events-none"></div>

  <div class="relative z-10 w-full max-w-sm px-4">
    <div class="bg-[#1a1a1a] border border-[#E94920]/20 rounded-3xl p-8 shadow-2xl">
      <div class="flex flex-col items-center mb-7">
        <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-[#E94920] to-[#ff6a45] flex items-center justify-center mb-4 overflow-hidden">
          <img src="{% static 'assets/logoRapidin.png' %}" alt="Rapidin" class="w-full h-full object-contain">
        </div>
        <h1 class="text-xl font-bold text-white">Recuperar Senha</h1>
        <p class="text-xs text-gray-500 mt-1 text-center">Digite seu e-mail para receber o link de redefinição</p>
      </div>

      <form method="post" class="flex flex-col gap-4">
        {% csrf_token %}
        <div class="flex flex-col gap-1.5">
          <label for="id_email" class="text-xs font-semibold text-[#E94920] uppercase tracking-wider">E-mail</label>
          <input type="email" name="email" id="id_email" placeholder="Digite seu email cadastrado" required
                 class="w-full px-4 py-3 bg-black/50 border border-[#E94920]/20 rounded-xl text-white text-sm placeholder-gray-600 focus:outline-none focus:border-[#E94920]/60 transition-colors">
          <p class="text-[11px] text-gray-600">Enviaremos um link para redefinir sua senha</p>
        </div>
        <button type="submit" class="w-full py-3 rounded-xl bg-gradient-to-r from-[#E94920] to-[#ff6a45] text-white font-bold text-sm uppercase tracking-wider hover:shadow-lg hover:shadow-[#E94920]/30 hover:-translate-y-0.5 transition-all">
          Enviar Link
        </button>
        <div class="text-center">
          <a href="{% url 'login' %}" class="text-xs text-[#E94920]/60 hover:text-[#E94920] transition-colors flex items-center justify-center gap-1">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            Voltar ao login
          </a>
        </div>
      </form>
    </div>
    <p class="text-center text-[11px] text-gray-700 mt-5">© 2026 Rapidin Plantões. Todos os direitos reservados.</p>
  </div>
</body>
</html>
